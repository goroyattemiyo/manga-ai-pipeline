# ------------------------------------------------
# 特殊キー（必要な場合のみ使う）
# ------------------------------------------------
#
# 【回想シーン】
# 回想中のコマ：frame: white
# 回想終了コマ：frame: black_flash
#
# 【ナレーション枠】
# narration: "あのとき――"
#
# 【心の声】
# inner_voice:
#   text: "[セリフ]"
#   style: 雲形フキダシ（心の声）
#
# 【声のみ・姿なしのキャラ】
# offscreen_voice:
#   speaker: "[キャラ名]（声のみ）"
#   text: "[セリフ]"
#   bubble_style: 角ばった吹き出し
#
# 【読者向けツッコミ役（遠くから独り言）】
# narrator_voice:
#   speaker: "[キャラC]（遠くで）"
